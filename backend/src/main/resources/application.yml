server:
  port: 8080

spring:
  application:
    name: vn-news-aggregator

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:vnnews}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

app:
  jwt:
    secret: ${JWT_SECRET:myDefaultJwtSecretKeyThatIsLongEnoughForHS512Algorithm2024!}
    access-token-expiration: 900000      # 15 minutes
    refresh-token-expiration: 604800000  # 7 days

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200,http://localhost:80}

  ai:
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: gemini-1.5-flash
      base-url: https://generativelanguage.googleapis.com/v1beta

  crawl:
    default-interval-minutes: 30
    user-agent: "VNNewsBot/1.0"

  rate-limit:
    articles:
      capacity: 60
      refill-minutes: 1
    search:
      capacity: 30
      refill-minutes: 1
    summarize:
      capacity: 10
      refill-minutes: 1

  geoip:
    database-path: ${GEOIP_DB_PATH:classpath:GeoLite2-City.mmdb}

logging:
  level:
    com.vnnews: DEBUG
    org.springframework.security: INFO
