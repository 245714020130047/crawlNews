spring:
  application:
    name: crawlnews-backend
  profiles:
    active: dev

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/crawlnews}
    username: ${SPRING_DATASOURCE_USERNAME:crawlnews}
    password: ${SPRING_DATASOURCE_PASSWORD:crawlnews123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        timezone:
          default_storage: NORMALIZE_UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 minutes default

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Ho_Chi_Minh
    default-property-inclusion: non_null

  mvc:
    format:
      date-time: iso

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  tomcat:
    max-threads: 50
    accept-count: 25
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers,env
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# JWT
app:
  jwt:
    secret: ${JWT_SECRET:crawlnews-super-secret-key-change-in-production-min-32-chars}
    access-token-expiry-ms: 3600000   # 1 hour
    refresh-token-expiry-ms: 604800000 # 7 days

  # AI Summarize
  summary:
    provider: ${AI_PROVIDER:OPENAI}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:gpt-4.1-mini}
    base-url: ${AI_BASE_URL:https://api.openai.com/v1}
    max-tokens-per-job: ${SUMMARY_MAX_TOKENS_PER_JOB:2000}
    daily-budget-usd: ${SUMMARY_DAILY_BUDGET_USD:5.0}
    max-requests-per-hour: ${SUMMARY_MAX_REQUESTS_PER_HOUR:50}

  # Crawler
  crawler:
    default-user-agent: "Mozilla/5.0 (compatible; CrawlNewsBot/1.0; +https://crawlnews.example.com/bot)"
    request-timeout-ms: 15000
    connect-timeout-ms: 8000
    max-retries: 3
    retry-backoff-ms: 2000
    thread-pool-size: 4
    redis-dedup:
      enabled: ${CRAWLER_REDIS_DEDUP_ENABLED:false}

  # Cors
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

logging:
  level:
    root: INFO
    com.crawlnews: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN
    net.javacrumbs.shedlock: INFO
