spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/crawlnews
    username: crawlnews
    password: crawlnews123

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    out-of-order: true

logging:
  level:
    root: INFO
    com.crawlnews: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    org.springframework.security: DEBUG

app:
  cors:
    allowed-origins: http://localhost:4200,http://localhost:3000

  crawler:
    thread-pool-size: 2
    redis-dedup:
      enabled: false
