version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vnnews
      POSTGRES_USER: vnnews
      POSTGRES_PASSWORD: vnnews_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vnnews
      SPRING_DATASOURCE_USERNAME: vnnews
      SPRING_DATASOURCE_PASSWORD: vnnews_secret
      SPRING_DATA_REDIS_HOST: redis
      JWT_SECRET: your-256-bit-secret-key-change-in-production
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
