version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crawlnews}
      POSTGRES_USER: ${POSTGRES_USER:-crawlnews}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crawlnews123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crawlnews}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-crawlnews}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-crawlnews}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-crawlnews123}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_JWT_SECRET: ${APP_JWT_SECRET:-changeme_in_production_32chars_min}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:4200}
      AI_PROVIDER: ${AI_PROVIDER:-GEMINI}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gemini-2.0-flash}
      AI_BASE_URL: ${AI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai}
      SUMMARY_MAX_TOKENS_PER_JOB: ${SUMMARY_MAX_TOKENS_PER_JOB:-1500}
      SUMMARY_DAILY_BUDGET_USD: ${SUMMARY_DAILY_BUDGET_USD:-1.0}
      SUMMARY_MAX_REQUESTS_PER_HOUR: ${SUMMARY_MAX_REQUESTS_PER_HOUR:-30}
      CRAWLER_REDIS_DEDUP_ENABLED: ${CRAWLER_REDIS_DEDUP_ENABLED:-false}
      JAVA_OPTS: -Xms256m -Xmx512m -XX:+UseG1GC
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL:-/api}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-4200}:80"

volumes:
  postgres_data:
  redis_data:
